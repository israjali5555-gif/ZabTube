<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZABTUBE - Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f0f0f;
  color:#fff;
  padding-bottom:90px;
}

header{
  position:sticky;
  top:0;
  z-index:999;
  background:#0f0f0f;
  border-bottom:1px solid #222;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:24px;
  font-weight:700;
}

.logo span{
  color:#ff0000;
}

.search-box{
  flex:1;
  max-width:600px;
  margin:0 20px;
  display:flex;
  gap:10px;
}

.search-box input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:30px;
  background:#181818;
  color:#fff;
  border:1px solid #333;
}

.btn{
  padding:12px 18px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
}

.login-btn{
  background:#fff;
  color:#111;
}

.profile-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.profile-img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #333;
}

.container{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:calc(100vh - 70px);
}

aside{
  background:#111;
  border-right:1px solid #222;
  padding:20px;
}

aside ul{
  list-style:none;
}

aside li{
  padding:14px;
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:.3s;
}

aside li:hover{
  background:#222;
}

main{
  padding:20px;
}

#user-info{
  background:#181818;
  padding:16px;
  border-radius:18px;
  margin-bottom:20px;
}

.categories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:20px;
}

.chip{
  background:#222;
  padding:10px 18px;
  border-radius:12px;
  white-space:nowrap;
  cursor:pointer;
}

.videos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:22px;
}

.card{
  cursor:pointer;
}

.thumbnail{
  position:relative;
  border-radius:18px;
  overflow:hidden;
}

.thumbnail img{
  width:100%;
  height:220px;
  object-fit:cover;
  display:block;
}

.duration{
  position:absolute;
  bottom:10px;
  right:10px;
  background:rgba(0,0,0,.8);
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
}

.card-content{
  display:flex;
  gap:12px;
  margin-top:12px;
}

.channel-img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

.video-info h3{
  font-size:15px;
  margin-bottom:6px;
}

.meta{
  color:#aaa;
  font-size:13px;
  line-height:1.5;
}

.logout-btn{
  margin-top:10px;
  background:#ff0000;
  color:#fff;
}

/* Bottom Navigation */

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  border-top:1px solid #222;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:10px 0;
  z-index:999;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:13px;
  cursor:pointer;
  color:#fff;
}

.add-btn{
  background:#fff;
  color:#111;
  width:52px;
  height:52px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}

@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
  }

  aside{
    display:none;
  }

  .search-box{
    display:none;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span>▶</span> ZABTUBE
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search videos...">
    <button class="btn login-btn" onclick="signInWithGoogle()">
      Google Login
    </button>
  </div>
</header>

<div class="container">

<aside>
<ul>
<li onclick="window.location.href='index.html'">🏠 Home</li>
<li>🔥 Trending</li>
<li>🎵 Music</li>
<li>🎬 Movies</li>
<li>📺 Subscriptions</li>
<li>📚 Library</li>
<li>⏱ Watch Later</li>
<li>👍 Liked Videos</li>
<li onclick="window.location.href='shorts.html'">🎬 Shorts</li>
</ul>
</aside>

<main>

<div id="user-info">
  <h3>Please Login With Google</h3>
</div>

<div class="categories">
  <div class="chip">All</div>
  <div class="chip">Music</div>
  <div class="chip">Gaming</div>
  <div class="chip">Movies</div>
  <div class="chip">Live</div>
  <div class="chip">Education</div>
  <div class="chip">News</div>
</div>

<div class="videos" id="videoContainer">
</div>

</main>
</div>

<!-- Bottom Navigation -->

<div class="bottom-nav">

<div class="nav-item" onclick="window.location.href='index.html'">
🏠
<span>Home</span>
</div>

<div class="nav-item" onclick="window.location.href='shorts.html'">
🎬
<span>Shorts</span>
</div>

<div class="add-btn" onclick="window.location.href='upload.html'">
+
</div>

<div class="nav-item">
📺
<span>Subs</span>
</div>

<div class="nav-item" onclick="window.location.href='channel.html'">
👤
<span>You</span>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase.js"></script>
<script src="script.js"></script>

<script>
firebase.auth().onAuthStateChanged(function(user) {
  const userBox = document.getElementById("user-info");

  if (!userBox) return;

  if (user) {
    userBox.innerHTML = `
      <div class="profile-box">
        <img class="profile-img" src="${user.photoURL}">
        <div>
          <h2>Welcome, ${user.displayName}</h2>
          <p>${user.email}</p>
          <button class="btn logout-btn" onclick="logoutUser()">Logout</button>
        </div>
      </div>
    `;
  } else {
    userBox.innerHTML = `
      <h3>Please Login With Google</h3>
    `;
  }
});
</script>

</body>
</html>
