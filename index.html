<!DOCTYPE html><html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoTube - YouTube Style App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: #0f0f0f;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #111;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: #ff0000;
}

.search-box {
  display: flex;
  width: 50%;
}

.search-box input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 25px 0 0 25px;
  outline: none;
  background: #222;
  color: white;
}

.search-box button {
  padding: 12px 20px;
  border: none;
  background: #ff0000;
  color: white;
  border-radius: 0 25px 25px 0;
  cursor: pointer;
}

.login-btn {
  background: #3ea6ff;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

.video-card {
  background: #181818;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.video-card:hover {
  transform: scale(1.02);
}

video {
  width: 100%;
  height: 220px;
  background: black;
}

.video-info {
  padding: 15px;
}

.video-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 8px;
}

.channel-name {
  color: #aaa;
  font-size: 14px;
}

footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  border-top: 1px solid #222;
}

footer button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

@media(max-width: 768px) {
  .search-box {
    width: 60%;
  }

  video {
    height: 180px;
  }
}

  </style>
</head>
<body>  <header>
    <div class="logo">▶ VideoTube</div><div class="search-box">
  <input type="text" placeholder="वीडियो खोजें..." />
  <button>Search</button>
</div>

<button class="login-btn">Google Login</button>

  </header>  <div class="container"><div class="video-card">
  <video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  <div class="video-info">
    <div class="video-title">Amazing Nature Video</div>
    <div class="channel-name">Nature Channel • 2M views</div>
  </div>
</div>

<div class="video-card">
  <video controls>
    <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
  </video>
  <div class="video-info">
    <div class="video-title">Travel Vlog 2026</div>
    <div class="channel-name">Travel India • 1.5M views</div>
  </div>
</div>

<div class="video-card">
  <video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  <div class="video-info">
    <div class="video-title">Music Video Collection</div>
    <div class="channel-name">Music World • 900K views</div>
  </div>
</div>

  </div>  <footer>
    <button>🏠 Home</button>
    <button>🎬 Shorts</button>
    <button>➕ Upload</button>
    <button>📺 Subscriptions</button>
    <button>👤 You</button>
  </footer></body>
</html>
