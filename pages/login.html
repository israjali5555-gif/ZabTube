<!DOCTYPE html><html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ZabTube</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }body {
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.login-box {
  width: 100%;
  max-width: 420px;
  background: #181818;
  border-radius: 20px;
  padding: 35px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  text-align: center;
}

.logo {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 10px;
}

.logo span {
  color: #ff0000;
}

h2 {
  margin-bottom: 10px;
  font-size: 24px;
}

p {
  color: #aaa;
  margin-bottom: 25px;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 1px solid #333;
  border-radius: 12px;
  background: #121212;
  color: white;
  outline: none;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  transition: 0.3s;
  margin-bottom: 12px;
}

.login-btn {
  background: #ff0000;
  color: white;
}

.google-btn {
  background: white;
  color: #111;
}

.btn:hover {
  transform: translateY(-2px);
}

.bottom-text {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}

.bottom-text a {
  color: #ff0000;
  text-decoration: none;
  font-weight: 600;
}

  </style>
</head>
<body>  <div class="login-box">
    <div class="logo">
      <span>▶</span> ZabTube
    </div><h2>Welcome Back</h2>
<p>Login to continue your premium video experience</p>

<input type="email" placeholder="Enter your email">
<input type="password" placeholder="Enter your password">

<button class="btn login-btn" onclick="emailLogin()">Login</button>
<button class="btn google-btn" onclick="signInWithGoogle()">Continue with Google</button>

<div class="bottom-text">
  Don’t have an account? <a href="#">Create Account</a>
</div>

  </div>  <script>
    function emailLogin() {
      alert("Email login backend next step me connect hoga.");
    }
  </script></body>
</html>
