<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZABTUBE - Upload Video</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f0f0f;
  color:#fff;
}

header{
  padding:18px;
  border-bottom:1px solid #222;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#111;
}

.logo{
  font-size:24px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.logo span{
  color:#ff0000;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.upload-box{
  background:#181818;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.title{
  font-size:28px;
  font-weight:700;
  margin-bottom:25px;
}

.form-group{
  margin-bottom:22px;
}

label{
  display:block;
  margin-bottom:10px;
  font-weight:500;
}

input,
textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #333;
  background:#111;
  color:#fff;
  outline:none;
  font-size:15px;
}

textarea{
  min-height:140px;
  resize:none;
}

.upload-preview{
  margin-top:14px;
  background:#111;
  border:2px dashed #333;
  border-radius:18px;
  padding:40px;
  text-align:center;
  color:#aaa;
}

.btn{
  padding:14px 24px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  font-size:15px;
}

.publish-btn{
  background:#ff0000;
  color:#fff;
}

.back-btn{
  background:#fff;
  color:#111;
}

.actions{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:20px;
}

.success-box{
  margin-top:25px;
  background:#111;
  padding:18px;
  border-radius:16px;
  display:none;
}

@media(max-width:768px){
  .container{
    margin:20px auto;
    padding:15px;
  }

  .upload-box{
    padding:20px;
  }

  .title{
    font-size:22px;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">
    <span>▶</span> ZABTUBE
  </div>
</header>

<div class="container">

<div class="upload-box">

<div class="title">
Upload New Video 🚀
</div>

<div class="form-group">
<label>Video Title</label>
<input type="text" id="videoTitle" placeholder="Enter video title">
</div>

<div class="form-group">
<label>Description</label>
<textarea id="videoDesc" placeholder="Write your video description..."></textarea>
</div>

<div class="form-group">
<label>Thumbnail Upload</label>
<input type="file">
</div>

<div class="upload-preview">
📁 Select Thumbnail + Prepare Your Video Upload
</div>

<div class="actions">
<button class="btn publish-btn" onclick="publishVideo()">
Publish Video
</button>

<button class="btn back-btn" onclick="window.location.href='index.html'">
Back Home
</button>
</div>

<div class="success-box" id="successBox">
✅ Your video has been published successfully on ZABTUBE!
</div>

</div>
</div>

<script>
function publishVideo() {
  const title = document.getElementById("videoTitle").value.trim();
  const desc = document.getElementById("videoDesc").value.trim();
  const successBox = document.getElementById("successBox");

  if (!title || !desc) {
    alert("Please fill all details");
    return;
  }

  successBox.style.display = "block";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 2000);
}
</script>

</body>
</html>
